<script>
(function() {
  var bg = window.getComputedStyle(document.documentElement).backgroundColor;
  if (bg !== 'rgb(8, 8, 16)') return;
  var canvas = document.createElement('canvas');
  canvas.id = 'bg-canvas';
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;display:block;';
  document.body.insertBefore(canvas, document.body.firstChild);
  var zs = document.createElement('style');
  zs.textContent = 'body>*:not(#bg-canvas){position:relative;z-index:1}';
  document.head.appendChild(zs);
  var ctx = canvas.getContext('2d'), stars = [], w, h;
  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    stars = Array.from({length:90}, function() {
      return {x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.2+0.3,
              a:Math.random()*0.5+0.3, sp:Math.random()*0.003+0.001, ph:Math.random()*Math.PI*2};
    });
  }
  function draw(t) {
    ctx.clearRect(0,0,w,h); ctx.fillStyle='#080810'; ctx.fillRect(0,0,w,h);
    ctx.lineWidth=0.5;
    for(var i=0;i<stars.length;i++) for(var j=i+1;j<stars.length;j++) {
      var dx=stars[i].x-stars[j].x, dy=stars[i].y-stars[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){ctx.globalAlpha=(1-d/100)*0.18;ctx.strokeStyle='rgba(217,119,6,1)';ctx.beginPath();ctx.moveTo(stars[i].x,stars[i].y);ctx.lineTo(stars[j].x,stars[j].y);ctx.stroke();}
    }
    ctx.globalAlpha=1;
    for(var k=0;k<stars.length;k++){
      var s=stars[k], al=s.a*(0.7+0.3*Math.sin(t*s.sp*1000+s.ph));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,250,220,'+al+')';ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize); resize(); requestAnimationFrame(draw);
})();
</script>
