baseURL: "https://yourdomain.com/"
title: "Adam Simnett"
pagination:
  pagerSize: 10
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  background: "topography"
  title: "Adam Simnett"
  description: "Azure Engineer. Writing about cloud infrastructure, platform engineering, and lessons from building systems at scale."
  keywords: [azure, cloud, infrastructure, engineering, blog]
  author: "Adam Simnett"

  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"

  label:
    text: "Adam Simnett"

  # Homepage profile
  profileMode:
    enabled: true
    title: "Adam Simnett"
    subtitle: "Azure Engineer · Tech Enthusiast"
    imageUrl: "/images/headshot.jpg"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Adam Simnett"
    buttons:
      - name: Blog
        url: /posts
      - name: About
        url: /about

  # Social icons in footer
  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/adam-simnett"
    - name: github
      url: "https://github.com/adamsimnett"
    - name: email
      url: "mailto:asimnett@adamsimnett.com"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/yourusername/yourusername.github.io/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 10
    - identifier: about
      name: About
      url: /about/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreLogs:
  - warning-goldmark-raw-html